<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Video Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .video-box { aspect-ratio: 16/9; background: #000; border-radius: 1rem; overflow: hidden; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col font-sans overflow-hidden">

    <!-- 設定画面 -->
    <div id="setup-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/90 backdrop-blur-sm p-4">
        <div class="glass p-8 rounded-3xl w-full max-w-lg shadow-2xl border border-slate-700">
            <h2 class="text-3xl font-bold mb-6 text-center text-indigo-400">Join Meeting</h2>
            <div class="video-box mb-6 border border-slate-700"><video id="preview-video" autoplay playsinline muted></video></div>
            <input type="text" id="username" placeholder="ニックネームを入力..." class="w-full bg-slate-800 p-4 rounded-xl mb-4 border border-slate-700 outline-none focus:border-indigo-500">
            <div class="grid grid-cols-2 gap-4 mb-6">
                <button id="btn-mic" onclick="toggleAudio()" class="py-3 rounded-xl font-bold transition-all bg-indigo-600">マイク: ON</button>
                <button id="btn-cam" onclick="toggleVideo()" class="py-3 rounded-xl font-bold transition-all bg-indigo-600">カメラ: ON</button>
            </div>
            <button onclick="startApp()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 rounded-xl font-bold text-lg shadow-lg shadow-indigo-500/20">参加する</button>
        </div>
    </div>

    <!-- メイン画面 -->
    <div id="main-app" class="hidden flex-1 flex flex-col md:flex-row overflow-hidden h-screen">
        <!-- ビデオエリア -->
        <div id="video-grid" class="flex-1 p-6 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 overflow-y-auto">
            <div class="video-box" id="local-box">
                <video id="local-video" autoplay playsinline muted></video>
                <div class="absolute bottom-4 left-4 bg-black/60 px-3 py-1 rounded-full text-xs">自分</div>
            </div>
        </div>

        <!-- チャットサイドバー -->
        <div class="w-full md:w-80 glass flex flex-col border-l border-slate-800">
            <div class="p-4 border-b border-slate-800 font-bold flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-green-500"></div> チャット履歴
            </div>
            <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
            
            <!-- 送信エリア -->
            <div class="p-4 bg-slate-900/50 flex gap-2">
                <input type="text" id="chat-input" placeholder="メッセージ..." class="flex-1 bg-slate-800 p-3 rounded-lg border border-slate-700 outline-none focus:border-indigo-500">
                <button onclick="sendMessage()" class="bg-indigo-600 px-4 rounded-lg hover:bg-indigo-500 transition-all font-bold">送信</button>
            </div>
        </div>
    </div>

    <script>
        let localStream, peer, myName;
        const connections =[];

        // 初期化
        async function initPreview() {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('preview-video').srcObject = localStream;
            document.getElementById('local-video').srcObject = localStream;
        }
        initPreview();

        // 状態切替
        function toggleAudio() {
            const track = localStream.getAudioTracks()[0];
            track.enabled = !track.enabled;
            const btn = document.getElementById('btn-mic');
            btn.textContent = track.enabled ? "マイク: ON" : "マイク: OFF";
            btn.className = `py-3 rounded-xl font-bold transition-all ${track.enabled ? 'bg-indigo-600' : 'bg-rose-600'}`;
        }

        function toggleVideo() {
            const track = localStream.getVideoTracks()[0];
            track.enabled = !track.enabled;
            const btn = document.getElementById('btn-cam');
            btn.textContent = track.enabled ? "カメラ: ON" : "カメラ: OFF";
            btn.className = `py-3 rounded-xl font-bold transition-all ${track.enabled ? 'bg-indigo-600' : 'bg-rose-600'}`;
        }

        // --- チャット送信ロジックを統合 ---
        function sendMessage() {
            const input = document.getElementById('chat-input');
            const msg = input.value;
            if (!msg) return; // 空なら送信しない

            appendMessage(myName, msg, true); // UI反映
            connections.forEach(conn => conn.send({name: myName, msg: msg})); // 相手へ送信
            input.value = ''; // クリア
        }

        // Enterキー対応
        document.getElementById('chat-input').addEventListener('keydown', (e) => {
            if(e.key === 'Enter') sendMessage();
        });

        // --- 以下は既存の接続処理 ---
        function startApp() {
            myName = document.getElementById('username').value || "Guest";
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            peer = new Peer(undefined, { host: '0.peerjs.com', port: 443, secure: true });
            peer.on('call', call => {
                call.answer(localStream);
                call.on('stream', stream => addVideo(call.peer, stream));
                setupConnection(call.peer);
            });
            peer.on('connection', conn => setupConnection(conn));
        }

        function setupConnection(conn) {
            if (typeof conn === 'string') conn = peer.connect(conn);
            connections.push(conn);
            conn.on('data', data => appendMessage(data.name, data.msg, false));
        }

        function appendMessage(name, msg, isMe) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'}`;
            div.innerHTML = `
                <span class="text-[10px] text-slate-400 mb-1">${name}</span>
                <div class="${isMe ? 'bg-indigo-600' : 'bg-slate-700'} px-4 py-2 rounded-2xl max-w-[90%] text-sm">
                    ${msg}
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function addVideo(peerId, stream) {
            if(document.getElementById(`v-${peerId}`)) return;
            const div = document.createElement('div');
            div.className = 'video-box'; div.id = `v-${peerId}`;
            const v = document.createElement('video'); v.srcObject = stream; v.autoplay = true;
            div.appendChild(v);
            document.getElementById('video-grid').appendChild(div);
        }
    </script>
</body>
</html>
